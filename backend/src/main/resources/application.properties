# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:frauddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Anthropic API Key (set your key here OR as env variable ANTHROPIC_API_KEY)
anthropic.api.key=${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY_HERE}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173
